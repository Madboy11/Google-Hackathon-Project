openapi: 3.0.0
info:
  title: NEXUS-SC API
  version: 1.0.0
  description: API specifications for Dev A backend modules
paths:
  /health:
    get:
      summary: Service health check
      responses:
        '200':
          description: Health OK
          content:
            application/json:
              example:
                status: "OK"
                service: "NEXUS-SC Dev A Backend"
  /risk-score:
    post:
      summary: Returns disruption risk score per node
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                node_id:
                  type: string
                time_horizon:
                  type: string
                  default: "72h"
            example:
              node_id: "red_sea"
              time_horizon: "72h"
      responses:
        '200':
          description: Risk score details
          content:
            application/json:
              example:
                node_id: "red_sea"
                risk_score: 0.95
                time_horizon: "72h"
  /routing/current:
    get:
      summary: Current RL routing recommendations
      responses:
        '200':
          description: A list of current active routes
          content:
            application/json:
              example:
                - vessel_id: "IMO-100200"
                  status: "on_time"
                  current_action: "maintain"
  /routing/override:
    post:
      summary: Manual human override for routing
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                vessel_id:
                  type: string
                action:
                  type: string
            example:
              vessel_id: "IMO-300400"
              action: "divert_port_B"
      responses:
        '200':
          description: Override result
          content:
            application/json:
              example:
                status: "success"
                UpdatedRoute:
                  vessel_id: "IMO-300400"
                  status: "delayed"
                  current_action: "divert_port_B"
  /inventory/safety-stock:
    get:
      summary: Current safety stock levels per SKU
      parameters:
        - in: query
          name: sku_id
          schema:
            type: string
          required: true
          example: "SKU-ABC"
      responses:
        '200':
          description: Recommended safety stock
          content:
            application/json:
              example:
                sku_id: "SKU-ABC"
                current_stock: 110
                recommended_stock: 147
                po_info:
                  sku_id: "SKU-ABC"
                  po_triggered: false
                  po_quantity: 0
  /inventory/trigger-po:
    post:
      summary: Manually trigger purchase order
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sku_id:
                  type: string
                quantity:
                  type: integer
            example:
              sku_id: "SKU-ABC"
              quantity: 50
      responses:
        '200':
          description: Successful PO trigger
          content:
            application/json:
              example:
                status: "success"
                message: "Successfully triggered manual PO for SKU-ABC x50"
